<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applied Texas Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0d1b3e;
      --gold: #f0b429;
      --white: #ffffff;
      --glass: rgba(13,27,62,0.88);
      --border: rgba(240,180,41,0.25);
      --transition: .35s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw;
      height: 72px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo img {
      height: 59px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .nav-links {
      display: flex; gap: 36px; align-items: center;
    }
    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.75);
      transition: color var(--transition);
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform var(--transition);
      transform-origin: left;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-links a.active { color: var(--gold); }
    .nav-links a.active::after { transform: scaleX(1); }
    .nav-cta {
      background: var(--gold) !important;
      color: var(--navy) !important;
      padding: 8px 22px;
      font-weight: 600 !important;
      border-radius: 3px;
      transition: opacity .2s !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { opacity: .88 !important; color: var(--navy) !important; }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none;
      flex-direction: column; gap: 5px;
      cursor: pointer; padding: 8px;
      background: none; border: none;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--white);
      transition: transform var(--transition), opacity var(--transition);
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    /* ── HERO (background only) ── */

      position: relative;
      width: 100%;
      height: calc(100vh - 72px);
      margin-top: 72px;
      overflow: hidden;
    }

    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 38% 55%,
          rgba(255,255,255,0.18) 0%,
          rgba(255,255,255,0.06) 45%,
          transparent 70%),
        radial-gradient(ellipse 40% 50% at 20% 40%,
          rgba(220,235,255,0.14) 0%,
          transparent 65%);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-links {
        position: fixed;
        top: 72px; left: 0; right: 0;
        background: var(--glass);
        backdrop-filter: blur(18px);
        flex-direction: column;
        padding: 32px 5vw 40px;
        gap: 24px;
        transform: translateY(-120%);
        transition: transform var(--transition);
        border-bottom: 1px solid var(--border);
      }
      .nav-links.open { transform: translateY(0); }
      .nav-links a { font-size: 16px; }
    }

    /* ── FOOTER ── */
    footer {
      background: rgba(5, 12, 28, 0.97);
      border-top: 1px solid var(--border);
      padding: 44px 5vw 28px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .footer-columns {
      display: flex;
      flex-wrap: wrap;
      gap: 60px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .footer-col-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    .footer-contact {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .footer-contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
    }

    .footer-contact-item .icon {
      font-size: 14px;
      color: var(--gold);
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }

    .footer-contact-item a {
      color: rgba(255,255,255,0.72);
      transition: color var(--transition);
    }
    .footer-contact-item a:hover { color: var(--gold); }

    .footer-col-divider {
      width: 1px;
      background: rgba(255,255,255,0.08);
      align-self: stretch;
    }

    .footer-services {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .footer-services li {
      list-style: none;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      padding-left: 14px;
      position: relative;
    }

    .footer-services li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 11px;
      top: 1px;
    }

    .footer-disclaimer {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
      text-align: center;
      padding-top: 20px;
    }

    @media (max-width: 768px) {
      .footer-columns {
        flex-direction: column;
        gap: 32px;
      }
      .footer-col-divider { display: none; }
    }

    /* ── PIPELINE CARD ── */
    .hero-bottom {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      padding: 40px 5vw 0;
    }

    .pipeline-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 28px 28px 20px;
      width: 320px;
      flex-shrink: 0;
    }

    .pipeline-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .pipeline-icon {
      width: 46px; height: 46px;
      background: rgba(240,180,41,0.15);
      border: 1px solid rgba(240,180,41,0.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .pipeline-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
    }

    .pipeline-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .pipeline-steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pipeline-step {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      transition: background 0.25s, border-color 0.25s;
    }

    .pipeline-step:hover {
      background: rgba(240,180,41,0.09);
      border-color: rgba(240,180,41,0.28);
    }

    .pipeline-step-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--gold);
      width: 28px;
      flex-shrink: 0;
      line-height: 1;
    }

    .pipeline-step-label {
      font-size: 14px;
      color: rgba(255,255,255,0.88);
      flex: 1;
    }

    .pipeline-step-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(240,180,41,0.14);
      border: 1px solid rgba(240,180,41,0.25);
      padding: 3px 9px;
      border-radius: 100px;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .hero-bottom {
        justify-content: center;
        padding: 28px 5vw 0;
      }
      .pipeline-card {
        width: 100%;
        max-width: 380px;
      }
    }
  </style>
